<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diyarı Vefa | VIP Talep Yönetimi</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --bg: #080808;
            --card-bg: #121212;
            --danger: #e74c3c;
            --success: #2ecc71;
        }

        body {
            background-color: var(--bg);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* --- ÜST KONTROL ÇUBUĞU (NAVBAR) --- */
        .header-dashboard {
            background: #000;
            border-bottom: 2px solid var(--gold);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .brand h1 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: 3px;
        }

        /* Ses Kontrol Merkezi */
        .audio-control-center {
            display: flex;
            align-items: center;
            background: #1a1a1a;
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid rgba(197, 160, 89, 0.3);
            gap: 15px;
        }

        .mute-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--gold);
            padding: 0;
            transition: 0.3s;
        }

        .mute-btn.is-muted { color: var(--danger); }

        .vol-slider {
            width: 100px;
            cursor: pointer;
            accent-color: var(--gold);
        }

        #volNum {
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--gold);
            min-width: 40px;
        }

        /* --- TALEPLER ALANI --- */
        .content-area {
            padding: 30px;
            overflow-y: auto;
            flex-grow: 1;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        /* Talep Kartı Tasarımı */
        .request-card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 25px;
            position: relative;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transition: 0.3s;
        }

        .request-card:hover {
            border-color: var(--gold);
            transform: translateY(-5px);
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .masa-tag {
            background: var(--gold);
            color: #000;
            padding: 5px 15px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 1.1rem;
        }

        .time-tag {
            font-size: 0.75rem;
            color: #666;
        }

        .request-type {
            font-size: 1.4rem;
            font-weight: 400;
            margin: 15px 0;
            color: #eee;
        }

        .complete-btn {
            width: 100%;
            background: transparent;
            border: 1px solid var(--success);
            color: var(--success);
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .complete-btn:hover {
            background: var(--success);
            color: #000;
        }

        /* Boş Durum Yazısı */
        #emptyState {
            text-align: center;
            color: #333;
            margin-top: 100px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <header class="header-dashboard">
        <div class="brand">
            <h1>DİYARI VEFA <span style="font-size: 0.8rem; font-family: 'Inter'; font-weight: 300; letter-spacing: 1px;">| PANEL</span></h1>
        </div>

        <div class="audio-control-center">
            <button id="muteToggle" class="mute-btn" onclick="handleMute()">🔊</button>
            <input type="range" class="vol-slider" id="volSlider" min="0" max="1" step="0.1" value="1" oninput="handleVolume(this.value)">
            <span id="volNum">100%</span>
        </div>
    </header>

    <main class="content-area">
        <div id="emptyState">Şu an aktif talep bulunmuyor...</div>
        <div id="grid" class="grid-container"></div>
    </main>

    <audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyAw_0IovkGJLXoSpG8NlhReI1zACh5Quis",
            authDomain: "diyar-i-vefa-menu-e2aa9.firebaseapp.com",
            databaseURL: "https://diyar-i-vefa-menu-e2aa9-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "diyar-i-vefa-menu-e2aa9",
            storageBucket: "diyar-i-vefa-menu-e2aa9.firebasestorage.app",
            messagingSenderId: "741373134834",
            appId: "1:741373134834:web:47614d282765b4b529cd6b"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const sound = document.getElementById('notifSound');
        
        let isMuted = false;
        let lastVolume = 1.0;
        let isInitialLoad = true;

        // SES YÖNETİMİ
        window.handleVolume = (val) => {
            lastVolume = val;
            if(!isMuted) sound.volume = val;
            document.getElementById('volNum').innerText = Math.round(val * 100) + "%";
        };

        window.handleMute = () => {
            isMuted = !isMuted;
            const btn = document.getElementById('muteToggle');
            btn.innerText = isMuted ? "🔇" : "🔊";
            btn.classList.toggle('is-muted', isMuted);
            sound.volume = isMuted ? 0 : lastVolume;
        };

        // VERİ TABANI DİNLEME
        const talepRef = ref(database, 'talepler');
        onValue(talepRef, (snapshot) => {
            const grid = document.getElementById('grid');
            const emptyState = document.getElementById('emptyState');
            grid.innerHTML = "";
            
            if (snapshot.exists()) {
                emptyState.style.display = "none";
                let count = 0;
                
                snapshot.forEach((childSnapshot) => {
                    count++;
                    const data = childSnapshot.val();
                    const key = childSnapshot.key;
                    
                    grid.innerHTML += `
                        <div class="request-card">
                            <div class="card-header">
                                <span class="masa-tag">${data.masa}</span>
                                <span class="time-tag">${data.zaman}</span>
                            </div>
                            <div class="request-type">${data.tur}</div>
                            <button class="complete-btn" onclick="finishTask('${key}')">Tamamlandı</button>
                        </div>
                    `;
                });

                // Yeni talep geldiğinde ses çal (ilk açılışta çalmaz)
                if (!isInitialLoad && !isMuted) {
                    sound.play().catch(e => console.log("Ses çalma izni bekleniyor..."));
                }
            } else {
                emptyState.style.display = "block";
            }
            isInitialLoad = false;
        });

        window.finishTask = (key) => {
            const itemRef = ref(database, 'talepler/' + key);
            remove(itemRef);
        };
    </script>
</body>
</html>
